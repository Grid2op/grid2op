    upload_coverage:
        executor: grid2op-executor
        steps:
            - checkout
            - run:
                name: Fetch full git history for SonarScanner SCM blame
                command: git fetch --unshallow || true
            - attach_workspace:
                at: /tmp/coverage_shards
            - run: python -m pip install virtualenv
            - run: python -m virtualenv venv_coverage
            - run:
                command: |
                    source venv_coverage/bin/activate
                    pip install coverage

            - run:
                name: Debug env vars
                command: |
                    echo "CODACY_PROJECT_TOKEN is set: $([ -n "$CODACY_PROJECT_TOKEN" ] && echo YES || echo NO)"

            - run:
                name: Combine and convert coverage
                command: |
                    source venv_coverage/bin/activate
                    cd /tmp/coverage_shards
                    coverage combine --keep
                    coverage xml --ignore-errors -o /tmp/coverage.xml

            - store_artifacts:
                path: /tmp/coverage.xml
                destination: coverage_artifacts/
                
            - run:
                name: Upload to Codacy
                command: |
                    bash <(curl -Ls https://coverage.codacy.com/get.sh) report \
                        -r /tmp/coverage.xml \
                        --project-token "$CODACY_PROJECT_TOKEN"
            
            - run:
                name: Upload to SonarQube Cloud
                command: |
                    curl -Ls https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-8.1.0.6389-linux-x64.zip \
                        -o sonar-scanner.zip
                    unzip -q sonar-scanner.zip
                    ./sonar-scanner-8.1.0.6389-linux-x64/bin/sonar-scanner \
                        -Dsonar.token="$SONAR_TOKEN" \
                        -Dsonar.host.url=https://sonarcloud.io \
                        -Dsonar.organization=grid2op \
                        -Dsonar.projectKey=Grid2op_grid2op \
                        -Dsonar.scm.disabled=true \
                        -Dsonar.python.coverage.reportPaths=/tmp/coverage.xml
            
