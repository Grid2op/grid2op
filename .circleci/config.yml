version: 2.1

executors:
    grid2op-executor:
        docker:
            - image: python:3.12
        working_directory: /Grid2Op

    python37:
        docker:
            - image: python:3.7
    python38:
        docker:
            - image: python:3.8
    python39:
        docker:
            - image: cimg/python:3.9
    python310:
        docker:
            - image: cimg/python:3.10
    python311:
        docker:
            - image: cimg/python:3.11
    python312:
        docker:
            - image: cimg/python:3.12
    python313:
        docker:
            - image: cimg/python:3.13
    python314:
        docker:
            - image: cimg/python:3.14

jobs:
    test_generic:
        executor: grid2op-executor
        resource_class: medium+
        parallelism: 4
        steps:
            - checkout
            - run: apt-get update -y
            - run: apt-get install -y coinor-cbc
            - run: python -m pip install virtualenv
            - run: python -m virtualenv venv_test
            - run:
               command: |
                   source venv_test/bin/activate
                   pip install -U pip setuptools wheel coverage
            - run:
                command: |
                  source venv_test/bin/activate
                  pip install -e .[test]
                  export _GRID2OP_FORCE_TEST=1
                  cd grid2op/tests/
                  python3 helper_list_test.py > li_test
                  cat li_test | circleci tests split > /tmp/tests_run
            - run:
                command: |
                  source venv_test/bin/activate
                  pip freeze
            - run: cat /tmp/tests_run

            - run:
                command: |
                  source venv_test/bin/activate
                  cd grid2op/tests/
                  export _GRID2OP_FORCE_TEST=1
                  export COVERAGE_FILE=/tmp/coverage_shards/.coverage.shard_test_generic_$CIRCLE_NODE_INDEX
                  coverage run -m unittest -v $(cat /tmp/tests_run)
                  ls -lah | grep .coverage

            - persist_to_workspace:
                root: /tmp/coverage_shards
                paths:
                    - .coverage.*

    test_agent:
        executor: grid2op-executor
        resource_class: small
        steps:
