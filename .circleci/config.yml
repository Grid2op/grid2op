                   cd grid2op/tests/
                   coverage run -m unittest -v \
                        test_Agent \
                        test_AgentsFast \
                        test_recopowerlineperarea \
                        test_Opponent \
                        test_baseline_alert
                   ls -lah | grep .coverage

            - persist_to_workspace:
